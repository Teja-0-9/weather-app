<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/webfont/1.6.7/webfontloader.js" integrity="sha512-26olFSbV0MSuiU49lTy+WDfvfl2xKM45SVVBoosuhPwhSpIurjgqPraS6lOMPFh0q0iSa8jVlFZ0szrs0Z1qqw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<body>
    <div class="container">
        <div class="header">
            <input type="text" id="searchbar" placeholder="enter city name">
            <button id="btn"><img src="pngs/search.png" width="25px"></img></button>
        </div>
        <div class="weather">
            <img src="pngs/rain.png"  class="weather-icon">
            <h1 class="temp">22&deg;c</h1>
            <h2 class="city">Bangalore</h2>
        </div>
        <div class="details">
            <div class="hum">
                <img src="pngs/humidity.png" class="humidity-img">
                <div>
                    <p class="humidity">30%</p>
                    <p class="text">Humidity</p>
                </div>
                </div>
                <div class="wind">
                <img src="pngs/wind.png" class="wind-img">
                <div>
                    <p class="wind-details">14KM/H</p>
                    <p class="text">Wind</p>
                </div>
            </div>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
